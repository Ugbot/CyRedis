name: Build & Publish

# Push a version tag to build all artifacts and publish to PyPI:
#   git tag v0.2.0 && git push origin v0.2.0
# Or run manually (workflow_dispatch) to build wheels without publishing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built artifacts to PyPI"
        type: boolean
        default: false

jobs:
  # ── Source distribution ──────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist
        run: pipx run build --sdist

      - name: Validate metadata
        run: pipx run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Binary wheels (manylinux + musllinux x86_64/aarch64, macOS x86_64/arm64) ──
  build-wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # manylinux + musllinux x86_64
          - ubuntu-24.04-arm   # manylinux + musllinux aarch64 (native arm runner)
          - macos-13           # x86_64
          - macos-14           # arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ── Publish to PyPI (OIDC trusted publishing) ─────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    # On a version tag, or a manual run with publish=true.
    if: github.event_name == 'push' || inputs.publish
    environment:
      name: pypi
      url: https://pypi.org/p/cy-redis
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── GitHub Release with the built artifacts ───────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-sdist, build-wheels]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
