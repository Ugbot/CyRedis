[build-system]
# setuptools >= 77 is required for the PEP 639 `license = "MIT"` string form.
requires = ["setuptools>=77", "Cython>=3.0,<4", "numpy>=1.21"]
build-backend = "setuptools.build_meta"

[project]
name = "cy-redis"
dynamic = ["version"]
description = "High-performance Redis client built with Cython and hiredis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    {name = "Ben Gamble", email = "ben.gamble@ververica.com"},
]
maintainers = [
    {name = "Ben Gamble", email = "ben.gamble@ververica.com"},
]
keywords = [
    "redis",
    "cython",
    "hiredis",
    "high-performance",
    "threading",
    "async",
    "database",
    "client",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Cython",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Networking",
]
# No runtime Python dependencies — all Redis communication goes through
# the vendored hiredis C library baked into the Cython extensions.
dependencies = []

[project.optional-dependencies]
# Modular layers — the core client has no runtime dependencies; each optional
# layer pulls only what it needs. `pip install cy-redis[web]`, etc.
async = [
    "uvloop>=0.17.0",
]
ai = [
    "numpy>=1.21.0",
]
auth = [
    "PyJWT>=2.0",
    "pyotp>=2.6",
]
web = [
    "fastapi>=0.100",
    "PyJWT>=2.0",
    "pyotp>=2.6",
]
game = [
    "msgpack>=1.0",
]
# pgcache is a server-side Redis module (loaded with MODULE LOAD); it needs no
# Python runtime dependency. The extra exists so intent can be declared.
pgcache = []
all = [
    "uvloop>=0.17.0",
    "numpy>=1.21.0",
    "PyJWT>=2.0",
    "pyotp>=2.6",
    "fastapi>=0.100",
    "msgpack>=1.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "pytest-timeout>=2.1",
    "black>=23.0",
    "flake8>=6.0",
    "isort>=5.12",
    "mypy>=1.0",
]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "pytest-timeout>=2.1",
    "redis>=5.0",
]

[project.urls]
Homepage = "https://github.com/Ugbot/CyRedis"
Repository = "https://github.com/Ugbot/CyRedis"
Issues = "https://github.com/Ugbot/CyRedis/issues"
Changelog = "https://github.com/Ugbot/CyRedis/blob/main/CHANGELOG.md"

[tool.setuptools]
zip-safe = false
include-package-data = true

[tool.setuptools.dynamic]
version = {attr = "cy_redis.__version__"}

[tool.setuptools.packages.find]
where = ["."]
include = ["cy_redis*", "cyredis_game*"]
exclude = ["tests*", "docs*", "scripts*", "plugins*", "examples*", "hiredis*"]

# ── cy_redis core ──────────────────────────────────────────────────────────────

[[tool.setuptools.ext-modules]]
name = "cy_redis.core.cy_redis_client"
sources = ["cy_redis/core/cy_redis_client.pyx"]
include-dirs = [".", "hiredis"]
extra-objects = ["hiredis/libhiredis.a"]

[[tool.setuptools.ext-modules]]
name = "cy_redis.core.redis_core"
sources = ["cy_redis/core/redis_core.pyx"]
include-dirs = [".", "hiredis"]
extra-objects = ["hiredis/libhiredis.a"]

[[tool.setuptools.ext-modules]]
name = "cy_redis.core.protocol"
sources = ["cy_redis/core/protocol.pyx"]
include-dirs = [".", "hiredis"]
extra-objects = ["hiredis/libhiredis.a"]

[[tool.setuptools.ext-modules]]
name = "cy_redis.core.async_core"
sources = ["cy_redis/core/async_core.pyx"]
include-dirs = [".", "hiredis"]
extra-objects = ["hiredis/libhiredis.a"]

# TLS support: links hiredis_ssl + OpenSSL. setup.py drops this extension when
# OpenSSL development headers are missing at build time (plain-TCP installs
# still work); it also injects the OpenSSL include/lib dirs on macOS.
[[tool.setuptools.ext-modules]]
name = "cy_redis.core.tls_support"
sources = ["cy_redis/core/tls_support.pyx"]
include-dirs = [".", "hiredis"]
extra-objects = ["hiredis/libhiredis_ssl.a", "hiredis/libhiredis.a"]
libraries = ["ssl", "crypto"]

