# ── Tool configuration ─────────────────────────────────────────────────────────

[tool.cython]
language_level = 3

[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311", "py312"]
extend-exclude = '''
/(\.eggs|\.git|\.venv|build|dist)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["cy_redis", "cyredis_game"]
known_third_party = ["Cython"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = ["Cython.*", "setuptools.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers --strict-config --tb=short"
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 300
timeout_method = "thread"
markers = [
    "unit: Unit tests that don't require external services",
    "integration: Integration tests requiring external services",
    "slow: Tests that take significant time to complete",
    "cluster: Tests requiring Redis cluster setup",
    "sentinel: Tests requiring Redis sentinel setup",
    "async_test: Asynchronous tests",
    "benchmark: Performance/benchmark tests",
    "docker: Tests that require Docker to be running",
    "pgcache: Tests for PostgreSQL cache module",
    "messaging: Tests for messaging functionality",
    "rpc: Tests for RPC functionality",
    "distributed: Tests for distributed features",
    "worker_coordination: Tests for worker coordination and recovery features",
    "requires_redis: Tests that require Redis to be running",
    "game_module: Tests requiring cy_game Redis module on port 6380",
    "requires_postgres: Tests that require PostgreSQL to be running",
    "skip_ci: Tests to skip in CI environment",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
]

[tool.uv]
package = true

[tool.uv.sources]
# Vendored libraries are built locally — never resolved from PyPI

# ── cibuildwheel: binary wheels for PyPI ────────────────────────────────────────
[tool.cibuildwheel]
# CPython 3.9–3.14; no PyPy (the extensions use CPython C-API + numpy), no 32-bit.
build = "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
skip = "*_i686 *-win32 pp*"
# setup.py builds the vendored hiredis static lib during build_ext, so no extra
# before-build step is needed. Import the compiled extension modules directly —
# cy_redis/__init__.py swallows ImportError, so `from cy_redis import
# CyRedisClient` would pass even on a wheel whose extensions are broken. Every
# published wheel must ship working TLS, so the check also creates a real TLS
# context via tls_support.
test-command = "python -c \"import cy_redis.core.cy_redis_client; import cy_redis; assert cy_redis.CyRedisClient is not None; import cy_redis.core.tls_support as t; t.create_ssl_context(); print('cy-redis', cy_redis.__version__, 'with TLS')\""

[tool.cibuildwheel.linux]
# OpenSSL headers for hiredis_ssl/tls_support: dnf on manylinux (AlmaLinux),
# apk on musllinux (Alpine).
before-all = "yum install -y openssl-devel || apk add --no-cache openssl-dev"

[tool.cibuildwheel.macos]
# Match the deployment target the vendored hiredis static lib is built against,
# so the wheel platform tag isn't artificially narrowed. GitHub macOS runners
# ship Homebrew OpenSSL; hiredis's Makefile and setup.py both search the
# Homebrew locations.
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }
before-all = "brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3"
