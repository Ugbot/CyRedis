[build-system]
requires = ["setuptools", "Cython>=0.29.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cy-redis"
version = "0.1.0"
description = "High-performance threaded Redis client using Cython and hiredis"
readme = "README_CYREDIS.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "AI Assistant", email = "assistant@example.com"},
]
maintainers = [
    {name = "AI Assistant", email = "assistant@example.com"},
]
keywords = [
    "redis",
    "cython",
    "hiredis",
    "high-performance",
    "threading",
    "async",
    "database",
    "client",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.6",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Cython",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Networking",
]
dependencies = [
    "Cython>=0.29.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-asyncio>=0.15",
    "black>=21.0",
    "flake8>=3.9",
    "mypy>=0.900",
    "isort>=5.8.0",
]
docs = [
    "sphinx>=4.0",
    "sphinx-rtd-theme>=1.0",
    "myst-parser>=0.15",
]
test = [
    "pytest>=6.0",
    "pytest-asyncio>=0.15",
    "pytest-cov>=2.10",
]

[project.urls]
Homepage = "https://github.com/your-repo/cy-redis"
Documentation = "https://cy-redis.readthedocs.io/"
Repository = "https://github.com/your-repo/cy-redis"
Issues = "https://github.com/your-repo/cy-redis/issues"
Changelog = "https://github.com/your-repo/cy-redis/blob/main/CHANGELOG.md"

[tool.setuptools]
zip-safe = false
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["cy_redis*"]
exclude = ["tests*", "docs*", "scripts*", "plugins*", "examples*", "lua_scripts*", "hiredis*"]

# Core Infrastructure
[[tool.setuptools.ext-modules]]
name = "cy_redis.core.cy_redis_client"
sources = ["cy_redis/core/cy_redis_client.pyx"]
include-dirs = ["/Users/bengamble/CyRedis/hiredis"]
extra-objects = ["/Users/bengamble/CyRedis/hiredis/libhiredis.dylib"]

